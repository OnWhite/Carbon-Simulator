env:
  n_agents: 5
  world_size: [40, 40]
  episode_length: 100
  period: 10
  multi_action_mode_agents: false
  multi_action_mode_planner: true
  flatten_observations: true
  flatten_masks: true
  scenario_name: Carbon/Carbon_env
  components:
    - CarbonRedistribution:
        planner_mode: active
        fixed_punishment: 30
        total_idx: 40
        max_year_percent: 25
        years_predefined: None
        agents_predefined: None
    - Carbon_component:
        payment: 10
        require_Carbon_idx: 1
        lowest_rate: 0.02
        research_setting: ["e^-", 0.1]
        random_fails: 0.2
        delay: 1
        forget: 6
    - Carbon_auction:
        max_bid_ask: 20
        max_num_orders: 5
        order_duration: 2
    - Gather:
        collect_labor: 30
        collect_cost_coin: 10
  dense_log_frequency: 1
  isoelastic_eta: 0.23
  energy_cost: 0.1
  energy_warmup_constant: 10000
  energy_warmup_method: auto
  starting_agent_coin: 20
  mobile_coefficient: 0.2

general:
  ckpt_frequency_steps: 500
  cpus: 32
  episodes: 1000000
  gpus: 1
  eval_only: false
  restore_weights_agents: ''#'rllib/exp/allinone/ckpts297/agent.weights.train-step-10000000'   # start from scratch
  restore_weights_planner: '' #'rllib/exp/allinone/ckpts297/planner.weights.train-step-10000000'  # start from scratch
  train_planner: true
  fix_mobile: false
  dense_log_frequency: 250

agent_policy:
  clip_param: 0.3
  entropy_coeff: 0.025
  entropy_coeff_schedule: null
  gamma: 0.998
  grad_clip: 10.0
  kl_coeff: 0.0
  kl_target: 0.01
  lambda: 0.98
  lr: 0.0003
  lr_schedule: null
  use_gae: true
  vf_clip_param: 50.0
  vf_loss_coeff: 0.05
  vf_share_layers: false
  model:
    custom_model: Conv_Rnn
    custom_model_config:
      input_emb_vocab: 20
      idx_emb_dim: 5
      num_conv: 2
      num_fc: 2
      cell_size: 128
    max_seq_len: 50

planner_policy:
  clip_param: 0.3
  entropy_coeff: 0.125
  entropy_coeff_schedule:
    - [0, 2.0]
    - [50000000, 0.125]
  gamma: 0.998
  grad_clip: 10.0
  kl_coeff: 0.0
  kl_target: 0.01
  lambda: 0.98
  lr: 0.0001
  lr_schedule: null
  use_gae: true
  vf_clip_param: 50.0
  vf_loss_coeff: 0.05
  vf_share_layers: false
  model:
    custom_model: Conv_Rnn
    custom_model_config:
      input_emb_vocab: 20
      idx_emb_dim: 5
      num_conv: 2
      num_fc: 2
      cell_size: 256
    max_seq_len: 100

trainer:
  compress_observations: false
  batch_mode: truncate_episodes
  env_config: null
  multiagent: null
  seed: null
  framework: "torch"
  num_gpus: 1
  num_envs_per_worker: 1
  num_sgd_iter: 1
  num_workers: 32
  shuffle_sequences: true
  sgd_minibatch_size: 2000
  train_batch_size: 8000
  observation_filter: NoFilter
  rollout_fragment_length: 250